<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Use Case Diagram - Personal Budget & Finance Manager</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      padding: 12px;
      overflow-x: auto;
    }
    svg {
      min-width: 1120px;
      width: 100%;
      height: 760px;
      display: block;
    }
    .usecase {
      fill: #eef4ff;
      stroke: #1d4ed8;
      stroke-width: 2;
    }
    .boundary {
      fill: #fbfdff;
      stroke: #64748b;
      stroke-width: 2;
      stroke-dasharray: 6 4;
    }
    .label {
      font-size: 14px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .title-label {
      font-size: 16px;
      font-weight: bold;
      text-anchor: middle;
    }
    .line {
      stroke: #475569;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>UML Use Case Diagram</h1>
    <div class="card">
      <svg viewBox="0 0 1120 760" role="img" aria-label="Use case diagram for Personal Budget and Finance Manager">
        <!-- System boundary -->
        <rect x="280" y="40" width="800" height="680" class="boundary"></rect>
        <text x="680" y="65" class="title-label">Personal Budget &amp; Finance Manager (Nepal)</text>

        <!-- Actor: User -->
        <circle cx="120" cy="170" r="24" fill="none" stroke="#111827" stroke-width="3"></circle>
        <line x1="120" y1="194" x2="120" y2="270" class="line"></line>
        <line x1="80" y1="230" x2="160" y2="230" class="line"></line>
        <line x1="120" y1="270" x2="90" y2="330" class="line"></line>
        <line x1="120" y1="270" x2="150" y2="330" class="line"></line>
        <text x="120" y="360" class="title-label">User</text>

        <!-- Use cases -->
        <ellipse cx="460" cy="130" rx="120" ry="34" class="usecase"></ellipse>
        <text x="460" y="130" class="label">Sign Up</text>

        <ellipse cx="700" cy="130" rx="120" ry="34" class="usecase"></ellipse>
        <text x="700" y="130" class="label">Login</text>

        <ellipse cx="940" cy="130" rx="120" ry="34" class="usecase"></ellipse>
        <text x="940" y="130" class="label">Logout</text>

        <ellipse cx="460" cy="250" rx="140" ry="36" class="usecase"></ellipse>
        <text x="460" y="250" class="label">Manage Income</text>

        <ellipse cx="700" cy="250" rx="150" ry="36" class="usecase"></ellipse>
        <text x="700" y="250" class="label">Manage Expenses</text>

        <ellipse cx="940" cy="250" rx="130" ry="36" class="usecase"></ellipse>
        <text x="940" y="250" class="label">Set Budget</text>

        <ellipse cx="460" cy="390" rx="175" ry="36" class="usecase"></ellipse>
        <text x="460" y="390" class="label">Manage Savings Goals</text>

        <ellipse cx="700" cy="390" rx="140" ry="36" class="usecase"></ellipse>
        <text x="700" y="390" class="label">View Dashboard</text>

        <ellipse cx="940" cy="390" rx="130" ry="36" class="usecase"></ellipse>
        <text x="940" y="390" class="label">View Reports</text>

        <ellipse cx="700" cy="540" rx="130" ry="36" class="usecase"></ellipse>
        <text x="700" y="540" class="label">Calculate Tax</text>

        <!-- Associations -->
        <line x1="170" y1="220" x2="340" y2="130" class="line"></line>
        <line x1="170" y1="230" x2="580" y2="130" class="line"></line>
        <line x1="170" y1="240" x2="820" y2="130" class="line"></line>

        <line x1="170" y1="250" x2="320" y2="250" class="line"></line>
        <line x1="170" y1="260" x2="550" y2="250" class="line"></line>
        <line x1="170" y1="270" x2="810" y2="250" class="line"></line>

        <line x1="170" y1="280" x2="285" y2="390" class="line"></line>
        <line x1="170" y1="290" x2="560" y2="390" class="line"></line>
        <line x1="170" y1="300" x2="810" y2="390" class="line"></line>
        <line x1="170" y1="310" x2="570" y2="540" class="line"></line>
      </svg>
    </div>
  </div>
</body>
</html>
